<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LxzClaw</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; color: #eee; height: 100vh; display: flex;
    }
    .sidebar { width: 260px; background: #16213e; padding: 20px; border-right: 1px solid #0f3460; }
    .sidebar h1 { font-size: 1.4em; margin-bottom: 20px; color: #10b981; }
    .sidebar button { width: 100%; padding: 10px; margin-bottom: 10px; background: #0f3460; border: none; color: #fff; border-radius: 6px; cursor: pointer; }
    .sidebar button:hover { background: #1a4a7a; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; }
    .message { margin-bottom: 16px; max-width: 80%; }
    .message.user { margin-left: auto; background: #3b82f6; border-radius: 12px 12px 4px 12px; padding: 12px 16px; }
    .message.assistant { background: #2d3748; border-radius: 12px 12px 12px 4px; padding: 12px 16px; }
    .message .role { font-size: 0.75em; color: #10b981; margin-bottom: 4px; }
    .message.user .role { color: #93c5fd; }
    .message pre { background: #1a1a2e; padding: 8px; border-radius: 4px; margin-top: 8px; overflow-x: auto; font-size: 0.9em; }
    .input-area { padding: 20px; background: #16213e; border-top: 1px solid #0f3460; }
    .input-area textarea { width: 100%; padding: 12px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px; color: #fff; resize: none; height: 80px; }
    .input-area button { margin-top: 10px; padding: 10px 24px; background: #10b981; border: none; border-radius: 6px; color: #fff; cursor: pointer; }
    .input-area button:hover { background: #059669; }
    .input-area button:disabled { background: #4a5568; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>🦞 LxzClaw</h1>
    <button onclick="newSession()">New Session</button>
    <button onclick="clearMessages()">Clear</button>
    <div style="margin-top: 20px; font-size: 0.85em; color: #888;">
      <p>Session: <span id="sessionId">-</span></p>
      <p>Status: <span id="status">Disconnected</span></p>
    </div>
  </div>
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Type your message..."></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script>
    let ws = null;
    let sessionId = null;
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusSpan = document.getElementById('status');
    const sessionIdSpan = document.getElementById('sessionId');

    function connect() {
      ws = new WebSocket(`ws://${location.host}`);
      statusSpan.textContent = 'Connecting...';
      
      ws.onopen = () => {
        statusSpan.textContent = 'Connected';
        createSession();
      };
      
      ws.onclose = () => {
        statusSpan.textContent = 'Disconnected';
        setTimeout(connect, 2000);
      };
      
      ws.onerror = (e) => console.error('WS Error:', e);
      
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'chunk') {
          appendChunk(msg.payload.chunk);
        } else if (msg.type === 'response') {
          finalizeAssistant();
        }
      };
    }

    function createSession() {
      ws.send(JSON.stringify({ type: 'create_session', payload: { type: 'chat' } }));
      ws.onmessage = function handler(event) {
        const msg = JSON.parse(event.data);
        if (msg.type === 'session_created') {
          sessionId = msg.payload.sessionId;
          sessionIdSpan.textContent = sessionId.substring(0, 8) + '...';
          ws.onmessage = originalHandler;
        }
      };
    }

    function originalHandler(event) {
      const msg = JSON.parse(event.data);
      if (msg.type === 'chunk') {
        appendChunk(msg.payload.chunk);
      } else if (msg.type === 'response') {
        finalizeAssistant();
      }
    }

    function appendChunk(text) {
      let last = messagesDiv.lastElementChild;
      if (!last?.classList.contains('assistant') || last.dataset.finalized === 'true') {
        last = document.createElement('div');
        last.className = 'message assistant';
        last.innerHTML = '<div class="role">Assistant</div><div class="content"></div>';
        messagesDiv.appendChild(last);
      }
      last.querySelector('.content').textContent += text;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function finalizeAssistant() {
      let last = messagesDiv.lastElementChild;
      if (last?.classList.contains('assistant')) {
        last.dataset.finalized = 'true';
      }
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
    }

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `<div class="role">${role === 'user' ? 'You' : 'Assistant'}</div><div class="content">${escapeHtml(content)}</div>`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML.replace(/\n/g, '<br>');
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      sendBtn.disabled = true;
      input.disabled = true;
      addMessage('user', text);
      ws.send(JSON.stringify({ type: 'chat', payload: { message: text, sessionId } }));
    }

    function newSession() {
      messagesDiv.innerHTML = '';
      createSession();
    }

    function clearMessages() {
      messagesDiv.innerHTML = '';
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    connect();
  </script>
</body>
</html>
